<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="430" cy="430" r="200"/>
    </clipPath>
  </defs>

  <!-- Rounded-square app background (corners stay transparent) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Columnar "parquet" data motif, clipped inside the lens -->
  <g clip-path="url(#lensClip)">
    <rect x="306" y="430" width="56" height="150" rx="14" fill="#C7D2FE"/>
    <rect x="386" y="360" width="56" height="220" rx="14" fill="#EEF2FF"/>
    <rect x="466" y="408" width="56" height="172" rx="14" fill="#C7D2FE"/>
    <rect x="546" y="470" width="56" height="110" rx="14" fill="#EEF2FF"/>
  </g>

  <!-- Magnifying glass: lens ring + handle -->
  <circle cx="430" cy="430" r="232" fill="none" stroke="#FFFFFF" stroke-width="64"/>
  <line x1="600" y1="600" x2="788" y2="788" stroke="#FFFFFF" stroke-width="96" stroke-linecap="round"/>
</svg>
